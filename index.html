<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-0T0CCTHDPB"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-0T0CCTHDPB');
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Web App</title>
  <link href="/style.css" rel="stylesheet">
  <script>
    // Inline script to prevent theme flash
    const savedTheme = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const initialTheme = savedTheme || (prefersDark ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', initialTheme);
  </script>
</head>
<body>
  <div class="container">
    <main class="card">
      <h1>Hello, World!</h1>
      <p>Experience the modern web with system-aware dark and light modes.</p>
      <button id="themeToggle" class="theme-toggle" type="button">
        Switch to <span id="themeLabel">Dark</span> Mode
      </button>
    </main>

    <section class="card form-card">
      <h2>Partnership Inquiry</h2>
      <p>Interested in collaborating? Let's connect!</p>
      <form id="contactForm" action="https://formspree.io/f/xkovdvnv" method="POST">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required placeholder="Your Name">
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="your@email.com">
        </div>
        <div class="form-group">
          <label for="subject">Subject</label>
          <input type="text" id="subject" name="subject" placeholder="What is this about?">
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" required rows="4" placeholder="How can we help?"></textarea>
        </div>
        <button type="submit" class="submit-btn">Send Inquiry</button>
        <div id="formStatus" class="form-status"></div>
      </form>
    </section>
  </div>
  <script defer src="/main.js"></script>
</body>
</html>
